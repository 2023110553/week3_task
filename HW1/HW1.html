<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="HW.css" rel="stylesheet" type="text/css">
    <script src="https://kit.fontawesome.com/355f657385.js" crossorigin="anonymous"></script>
</head>
<body>
<div class="post">
    <header class="post-header">
        <div class="user-info">
            <div class="profile-img">
                <img src="안녕하세요.jpg" alt="profile-img">
            </div>
            <div class="profile-name">
                <p><strong>hhyun3_</strong></p>
                <p><strong>허현</strong></p>
            </div>
        </div>
        <div class="option-dots">
            <i class="fa-solid fa-ellipsis"></i>
        </div>
    </header>

    <section class="post-img">
        <img src="옷을잘사는법.jpg" alt="post-img">
    </section>

    <footer class="post-footer">
        <div class="emogie">
            <i class="fa-solid fa-heart"></i>
            <i class="fa-regular fa-comment"></i>
            <i class="fa-regular fa-paper-plane"></i>
            <i class="fa-regular fa-bookmark"></i>
        </div>

        <div class="likes">
            <p><strong>jaehun_allright</strong>님 외 <strong>300명</strong>이 좋아합니다.</p>
        </div>

        <div class="post-text">
            <p><strong>hhyun3_</strong> 옷을 실패없이 사는법</p>
        </div>

        <div class="date">
            <p>4월 28일</p>
        </div>
    </footer>
</div>
</body>
</html>
